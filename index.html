<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f9fafb" />
    <title>体重记录应用</title>
    <!-- 浏览器标签页图标（优先 SVG，回退 32x32 PNG） -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <!-- 主屏幕 / 添加到主屏幕 图标 (iOS / Android) -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="./manifest.json" />
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #f9fafb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      #app-loading img { width: 64px; height: 64px; }
      #app-loading span { font-family: system-ui, sans-serif; font-size: 14px; color: #6b7280; }
      #app-loading .spin {
        width: 24px; height: 24px;
        border: 2px solid #e5e7eb;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: app-load-spin 0.8s linear infinite;
      }
      @keyframes app-load-spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="app-loading" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="64" height="64" aria-hidden="true">
        <rect width="32" height="32" rx="6" fill="#0ea5e9"/>
        <path d="M8 22h16v1.5H8V22z" fill="rgba(255,255,255,0.9)"/>
        <path d="M16 8v14M12 12l4-4 4 4M12 16h8" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16" cy="20" r="2" fill="white"/>
      </svg>
      <span>加载中…</span>
      <div class="spin" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
